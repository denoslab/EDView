<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- App icon: stylised floor plan on the viewer's primary blue. -->
  <rect width="512" height="512" rx="96" fill="#1a4480"/>
  <g fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
    <!-- Building outline -->
    <rect x="88" y="88" width="336" height="336" rx="12"/>
    <!-- Horizontal corridor -->
    <line x1="88" y1="256" x2="424" y2="256"/>
    <!-- Upper-left room divider -->
    <line x1="232" y1="88" x2="232" y2="256"/>
    <!-- Lower-right room divider -->
    <line x1="288" y1="256" x2="288" y2="424"/>
  </g>
</svg>
